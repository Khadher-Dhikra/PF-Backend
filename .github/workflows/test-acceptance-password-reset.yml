name: Test Acceptation — Réinitialisation Mot de Passe

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - closed   # déclenché à la fermeture (merge inclus)

  push:
    branches:
      - main
      - develop

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 : Mise en place de l'environnement PHP
  # ─────────────────────────────────────────────
  setup:
    name: Setup PHP & Dépendances
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'push'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, openssl
          coverage: none

      - name: Installation des dépendances Composer
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Mise en cache des dépendances
        uses: actions/cache@v4
        with:
          path: vendor/
          key: composer-${{ hashFiles('composer.lock') }}

  # ─────────────────────────────────────────────
  # JOB 2 : Base de données de test
  # ─────────────────────────────────────────────
  database:
    name: Préparer la BDD de test
    runs-on: ubuntu-latest
    needs: setup
    if: github.event.pull_request.merged == true || github.event_name == 'push'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_password_reset
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql

      - name: Restaurer le cache Composer
        uses: actions/cache@v4
        with:
          path: vendor/
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Copier le fichier d'environnement
        run: cp .env.testing .env

      - name: Migrations de la base de données
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: test_password_reset
          DB_USERNAME: test_user
          DB_PASSWORD: test_pass
        run: php artisan migrate --force

  # ─────────────────────────────────────────────
  # JOB 3 : Tests d'acceptation — Critère principal
  # ─────────────────────────────────────────────
  acceptance-tests:
    name: "Acceptance · L'étudiant reçoit un email avec lien sécurisé"
    runs-on: ubuntu-latest
    needs: database
    if: github.event.pull_request.merged == true || github.event_name == 'push'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_password_reset
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: test_password_reset
      DB_USERNAME: test_user
      DB_PASSWORD: test_pass
      MAIL_MAILER: log        # Capture les emails dans les logs (pas d'envoi réel)
      APP_ENV: testing

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, openssl

      - name: Restaurer le cache Composer
        uses: actions/cache@v4
        with:
          path: vendor/
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Copier le fichier d'environnement
        run: cp .env.testing .env

      - name: Migrations
        run: php artisan migrate --force

      # ── Étape 1-2 : Étudiant clique Forgot & saisit son email ──
      - name: "Test · Étape 1-2 — Formulaire Forgot Password"
        run: php artisan test --filter ForgotPasswordFormTest --stop-on-failure

      # ── Étape 3 : PHP vérifie email en BDD ──
      - name: "Test · Étape 3 — Vérification email en base"
        run: php artisan test --filter EmailExistsInDatabaseTest --stop-on-failure

      # ── Étape 4 : Génération du token 64 caractères ──
      - name: "Test · Étape 4 — Génération token sécurisé 64 chars"
        run: php artisan test --filter SecureTokenGenerationTest --stop-on-failure

      # ── Étape 5 : Envoi email avec lien sécurisé (CRITÈRE PRINCIPAL) ──
      - name: "Test · Étape 5 — Email envoyé avec lien sécurisé [CRITÈRE ACCEPTATION]"
        run: php artisan test --filter PasswordResetEmailSentTest --stop-on-failure

      # ── Étapes 6-7 : Clic lien + saisie nouveau MDP ──
      - name: "Test · Étapes 6-7 — Lien valide et formulaire nouveau MDP"
        run: php artisan test --filter ResetLinkValidAndFormTest --stop-on-failure

      # ── Étape 8 : MDP hashé bcrypt + token invalidé + redirection ──
      - name: "Test · Étape 8 — Bcrypt, token invalidé, redirection Login"
        run: php artisan test --filter PasswordUpdatedAndTokenInvalidatedTest --stop-on-failure

      # ── Scénarios de sécurité ──
      - name: "Test · Sécurité — Token à usage unique"
        run: php artisan test --filter TokenSingleUseTest --stop-on-failure

      - name: "Test · Sécurité — Token expiré refusé"
        run: php artisan test --filter TokenExpirationTest --stop-on-failure

      - name: "Test · Sécurité — Email inconnu : réponse générique"
        run: php artisan test --filter UnknownEmailAntiEnumerationTest --stop-on-failure

      # ── Rapport final ──
      - name: Générer le rapport de tests
        if: always()
        run: php artisan test --log-junit storage/logs/test-results.xml

      - name: Upload rapport XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-tests-acceptation
          path: storage/logs/test-results.xml
          retention-days: 14

  # ─────────────────────────────────────────────
  # JOB 4 : Notification du résultat
  # ─────────────────────────────────────────────
  notify:
    name: Notification résultat
    runs-on: ubuntu-latest
    needs: acceptance-tests
    if: always()

    steps:
      - name: Succès — Critère d'acceptation validé
        if: needs.acceptance-tests.result == 'success'
        run: |
          echo "✅ CRITÈRE D'ACCEPTATION VALIDÉ"
          echo "L'étudiant reçoit bien un email avec un lien sécurisé permettant de définir un nouveau mot de passe."
          echo "Merge autorisé sur ${{ github.ref }}"

      - name: Échec — Critère d'acceptation non validé
        if: needs.acceptance-tests.result == 'failure'
        run: |
          echo "❌ CRITÈRE D'ACCEPTATION NON VALIDÉ"
          echo "Le merge a été bloqué. Vérifiez les logs ci-dessus."
          exit 1
